<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Diabetes Prediction</h1>

    <form action="/predict" method="post">
        <input type="number" name="pregnancies" placeholder="Pregnancies" required>
        <input type="number" name="glucose" placeholder="Glucose" required>
        <input type="number" name="blood_pressure" placeholder="Blood Pressure" required>
        <input type="number" name="skin_thickness" placeholder="Skin Thickness" required>
        <input type="number" name="insulin" placeholder="Insulin" required>
        <input type="number" name="bmi" placeholder="BMI" required>
        <input type="number" name="diabetes_pedigree" placeholder="Diabetes Pedigree" required>
        <input type="number" name="age" placeholder="Age" required>

        <button type="submit">Predict</button>
    </form>

    <h2>{{ result }}</h2>
</div>

</body>
</html>
